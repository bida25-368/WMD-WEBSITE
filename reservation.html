<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations | Kalahari Table</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="index.html">
                Kalahari Table
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About Us</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="reservation.html">Reservations</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="text-center py-5">
        <h1 class="display-3">Reserve Your Table</h1>
        <p class="text-muted">
            Book an unforgettable dining experience at Kalahari Table.
        </p>
    </section>

    <!-- Reservation Form -->
    <section class="container mb-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card bg-dark text-white p-4 shadow-lg">

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" required>
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Time</label>
                                <input type="time" class="form-control" required>
                            </div>

                        </div>

                        <div class="mb-3">
                            <label class="form-label">Number of Guests</label>

                            <select class="form-select" required>
                                <option value="">Select Guests</option>
                                <option>1 Person</option>
                                <option>2 People</option>
                                <option>3 People</option>
                                <option>4 People</option>
                                <option>5+ People</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Special Requests</label>
                            <textarea class="form-control" rows="4"></textarea>
                        </div>

                        <button type="submit" class="btn btn-warning w-100">
                            Book Now
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-dark text-center text-white py-3">
        <p>© 2026 Kalahari Table | Fine Dining Experience</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
